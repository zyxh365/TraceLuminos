apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-central
  namespace: tsp-observability
  labels:
    app: otel-central
    component: central-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-central
  template:
    metadata:
      labels:
        app: otel-central
        component: central-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:v0.149.0
          args: ["--config=/etc/otelcol/config.yaml"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: tsp-infra-env
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: tsp-infra-env
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_NATIVE_PORT
              valueFrom:
                configMapKeyRef:
                  name: tsp-infra-env
                  key: CLICKHOUSE_NATIVE_PORT
          ports:
            - containerPort: 13133
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: otel-central-config
