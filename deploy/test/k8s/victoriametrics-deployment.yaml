apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
  namespace: tsp-observability
  labels:
    app: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.139.0
          args:
            - "--storageDataPath=/var/lib/victoria-metrics"
            - "--retentionPeriod=90d"
            - "--memory.allowedPercent=80"
          ports:
            - containerPort: 8428
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/victoria-metrics
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: tsp-observability
  labels:
    app: victoriametrics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      protocol: TCP
  selector:
    app: victoriametrics
