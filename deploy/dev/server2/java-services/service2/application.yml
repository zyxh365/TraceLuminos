# ===========================================
# Java Service #2 - Spring Boot 配置
# JDK 11 → Spring Boot 2.7.x
# ===========================================

server:
  port: 8092

spring:
  application:
    name: tsp-java-service-2

  # ── MySQL ──────────────────────────────
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/tsp_business?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root_pass_2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ── Redis ──────────────────────────────
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    # password: ${REDIS_PASSWORD:}        # 如需密码则取消注释
    database: 1                           # 使用 db1，与 Service #1 隔离
    timeout: 5000ms
    lettuce:
      pool:
        min-idle: 5
        max-idle: 10
        max-active: 20
        max-wait: 3000ms

  # ── Kafka（Server 1）───────────────────
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:172.25.100.135:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
    consumer:
      group-id: tsp-service-2-group       # 不同的 consumer group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate

# ── MyBatis-Plus（可选，如使用 MyBatis-Plus）─────────
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ── 日志 ────────────────────────────────
logging:
  level:
    root: INFO
    com.example: DEBUG
    org.apache.kafka: WARN
  file:
    name: /opt/tsp-deploy/server2/java-services/logs/service2.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
