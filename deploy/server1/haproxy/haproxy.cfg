global
  log stdout format raw local0
  maxconn 4096

defaults
  log     global
  mode    tcp
  option  tcplog
  option  dontlognull
  timeout connect 5s
  timeout client  30s
  timeout server  30s

# ── OTLP gRPC 入口 → Edge Collector ──
frontend otel_grpc
  bind *:4317
  default_backend otel_edge_grpc

backend otel_edge_grpc
  balance roundrobin
  option httpchk GET /
  server edge1 otel-edge-1:4317 check port 13133
  server edge2 otel-edge-2:4317 check port 13133

# ── OTLP HTTP 入口 → Edge Collector ──
frontend otel_http
  bind *:4318
  default_backend otel_edge_http

backend otel_edge_http
  balance roundrobin
  option httpchk GET /
  http-check expect status 200
  server edge1 otel-edge-1:4318 check port 13133
  server edge2 otel-edge-2:4318 check port 13133

# ── HAProxy Stats 监控页 ──
frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /
  stats refresh 10s
